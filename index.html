<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>André Esperidião — Fashion & Editorial Photography</title>
  <meta name="description"
    content="High-end fashion and editorial photography portfolio. A study in light, form, and human expression." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <meta property="og:title" content="Andre Esperidiao — Fashion & Lifestyle Photography" />
  <meta property="og:description" content="High-end fashion and editorial photography portfolio." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
</head>

<body>

  <header id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo font-serif-display">Andre Esperidiao</a>
      <nav class="desktop-nav">
        <a href="work.html" class="nav-link">Work</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button id="menu-toggle">Menu</button>
    </div>
  </header>

  <div id="mobile-menu">
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <main class="page">

    <!-- Hero -->
    <section class="hero-section">
      <h1 class="hero-title">
        Andre<br><em>Esperidiao</em>
      </h1>
      <p class="hero-year font-sans-ui">Fashion & Lifestyle Photography</p>
    </section>

    <!-- Featured Work -->
    <section class="featured-section" id="featured-projects"></section>

    <!-- CTA -->
    <section class="section-padding cta-section">
      <a href="work.html" class="nav-link cta-link">View All Work</a>
    </section>

    <!-- Footer -->
    <footer class="section-padding site-footer">
      <div>
        <p class="font-serif-display" style="font-size:1.125rem">Andre Esperidiao</p>
        <p class="font-sans-ui text-muted" style="margin-top:0.5rem">Fashion &amp; Lifestyle Photography</p>
      </div>
      <div class="footer-links">
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="nav-link">Instagram</a>
        <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="nav-link">GitHub</a>
        <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="nav-link">LinkedIn</a>
      </div>
    </footer>

  </main>

  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('featured-projects');
      const featured = projects.slice(0, 3);

      featured.forEach((project, i) => {
        const el = document.createElement('a');
        el.href = `project.html?id=${project.id}`;
        el.className = 'project-link';
        el.innerHTML = `
      <div class="reveal-image image-container featured-img-centered" style="height:clamp(300px,80vh,900px);">
        <div class="shimmer"></div>
        <img src="${project.main ?? project.cover}" alt="${project.title}" loading="lazy"
             style="width:100%;height:100%;object-fit:cover;" />
      </div>
      <div class="project-meta featured-img-centered">
        <h2 class="font-serif-display project-title">${project.title}</h2>
        <span class="font-sans-ui text-muted tabular-nums">${project.year}</span>
      </div>
    `;
        container.appendChild(el);
      });

      initRevealImages();
      initImageLoad();
    });
  </script>
</body>

</html>
