<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>André Esperidião — Photography</title>
  <meta name="description" content="Fashion and lifestyle photography by André Esperidião. Based in Dublin, Ireland." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    /* ── Scroll container ── */
    .scroll-container {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100vh;
      overflow-x: scroll;
      overflow-y: hidden;
      scrollbar-width: none;
    }

    .scroll-container::-webkit-scrollbar { display: none; }

    /* ── Slides ── */
    .slide {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.30) 0%,
        transparent 22%,
        transparent 78%,
        rgba(0,0,0,0.30) 100%);
      pointer-events: none;
    }

    /* ── Nav ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 2.5rem;
      pointer-events: none;
    }

    .nav > * { pointer-events: auto; }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      opacity: 0.9;
      transition: opacity 0.2s;
    }

    .nav-logo:hover { opacity: 1; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #fff; }

    /* ── Burger ── */
    .nav-burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .nav-burger span {
      display: block;
      width: 22px;
      height: 1px;
      background: #fff;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .nav-burger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* ── Mobile menu ── */
    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(10,10,10,0.97);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.8rem;
      letter-spacing: 0.08em;
      color: #fff;
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .mobile-menu a:hover { opacity: 1; }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      pointer-events: none;
    }

    .footer > * { pointer-events: auto; }

    .footer-copy {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .footer-nav {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .footer-nav a {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-nav a:hover { color: rgba(255,255,255,0.8); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .nav-links  { display: none; }
      .nav-burger { display: flex; }
      .footer-nav { display: none; }
      .nav    { padding: 1.5rem; }
      .footer { padding: 1.25rem 1.5rem; }

      .scroll-container {
        flex-direction: column;
        overflow-x: hidden;
        overflow-y: scroll;
        -webkit-overflow-scrolling: touch;
      }

      .slide { flex: 0 0 100vh; }
    }
  </style>
</head>
<body>

  <header class="nav">
    <a href="index.html" class="nav-logo">André Esperidião</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-burger" id="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="scroll-container" id="scrollContainer"></div>

  <footer class="footer">
    <span class="footer-copy">© <span class="footer-year"></span> Andre.</span>
  </footer>

  <script src="main.js"></script>
</body>
</html>
