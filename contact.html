<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — André Esperidião</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo font-serif-display">André Esperidião</a>
      <nav class="desktop-nav">
        <a href="work.html" class="nav-link">Work</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button id="menu-toggle">Menu</button>
    </div>
  </header>

  <div id="mobile-menu">
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <main class="page">
    <section class="page-top" style="padding-left:1.5rem;padding-right:1.5rem;min-height:100svh;">
      <div style="max-width:36rem;">

        <h1 class="font-serif-display" style="font-size:clamp(2rem,5vw,4rem);font-weight:300;margin-bottom:2rem;">
          <em>Contact</em>
        </h1>
        <p class="font-sans-ui text-muted" style="margin-bottom:4rem;">
          Open to editorial and collaborative projects
        </p>

        <form class="contact-form" id="contact-form" action="https://formspree.io/f/xdapenod" method="POST">
          <div>
            <label class="font-sans-ui" for="name">Name</label>
            <input type="text" id="name" name="name" required autocomplete="name" />
          </div>
          <div>
            <label class="font-sans-ui" for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email" />
          </div>
          <div>
            <label class="font-sans-ui" for="message">Message</label>
            <textarea id="message" name="message" rows="4" required></textarea>
          </div>
          <button type="submit" class="contact-submit">Send Message</button>
        </form>

        <p class="font-sans-ui text-muted success-message" id="success-message">
          Thank you. I'll be in touch soon.
        </p>

      </div>
    </section>

    <footer class="page-footer">
      <span class="footer-copy">© <span class="footer-year"></span> Aã</span>
    </footer>
  </main>

  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('contact-form');
      const successMsg = document.getElementById('success-message');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          form.style.display = 'none';
          successMsg.classList.add('show');
        }
      });
    });
  </script>
</body>
</html>
