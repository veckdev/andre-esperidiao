<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Andre Esperidiao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo font-serif-display">Andre Esperidiao</a>
      <nav class="desktop-nav">
        <a href="work.html" class="nav-link">Work</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button id="menu-toggle">Menu</button>
    </div>
  </header>

  <div id="mobile-menu">
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <main class="page">

    <section style="padding: 0 1.5rem; padding-top: 10rem;" id="work-grid-section">
      <div class="work-grid" id="work-grid"></div>
    </section>

    <footer class="page-footer">
      <span class="footer-copy">© <span class="footer-year"></span> Aã</span>
      <ul class="footer-links">
        <li><a href="work.html" class="nav-link">Work</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
      </ul>
    </footer>

  </main>

  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('work-grid');

      projects.forEach((project, i) => {
        const el = document.createElement('a');
        el.href = `project.html?id=${project.id}`;
        el.className = 'project-link';
        el.innerHTML = `
          <div class="reveal-image image-container work-img-centered md-w-60" style="aspect-ratio:3/4;">
            <div class="shimmer"></div>
            <img src="${project.hero ?? project.cover}" alt="${project.title}" loading="lazy"
                 style="width:100%;height:100%;object-fit:cover;" />
          </div>
          <div class="project-meta work-img-centered md-w-60">
            <div>
              <h2 class="font-serif-display project-title">${project.title}</h2>
              <!-- <p class="font-sans-ui text-muted" style="margin-top:0.25rem;">${project.category}</p> -->
            </div>
            <span class="font-sans-ui text-muted tabular-nums">${project.year}</span>
          </div>
        `;
        grid.appendChild(el);
      });

      initRevealImages();
      initImageLoad();
    });
  </script>
</body>

</html>
