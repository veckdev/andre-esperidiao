<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Andre Esperidiao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo font-serif-display">Andre Esperidiao</a>
      <nav class="desktop-nav">
        <a href="work.html" class="nav-link">Work</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button id="menu-toggle">Menu</button>
    </div>
  </header>

  <div id="mobile-menu">
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <main class="page">
    <section class="page-top" style="padding-left:1.5rem;padding-right:1.5rem;">
      <h1 class="font-serif-display" style="font-size:clamp(2rem,6vw,4rem);margin-bottom:clamp(4rem,8vw,6rem);">
        Selected Work
      </h1>
      <div class="work-grid" id="work-grid"></div>
    </section>

    <footer class="section-padding site-footer">
      <div>
        <p class="font-serif-display" style="font-size:1.125rem">Andre Esperidiao</p>
        <p class="font-sans-ui text-muted" style="margin-top:0.5rem">Fashion &amp; Lifestyle Photography</p>
      </div>
      <div class="footer-links">
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="nav-link">Instagram</a>
        <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="nav-link">GitHub</a>
        <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="nav-link">LinkedIn</a>
      </div>
    </footer>
  </main>

  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const patterns = [
        ['w-full', 'md-w-65'],
        ['w-full', 'md-w-40', 'md-ml-auto'],
        ['w-full', 'md-w-55', 'md-ml-15'],
        ['w-full', 'md-w-60'],
        ['w-full', 'md-w-70', 'md-ml-auto'],
        ['w-full', 'md-w-45', 'md-ml-8'],
      ];

      const grid = document.getElementById('work-grid');

      projects.forEach((project, i) => {
        const wClasses = patterns[i % patterns.length].join(' ');
        const el = document.createElement('a');
        el.href = `project.html?id=${project.id}`;
        el.className = 'project-link';
        el.innerHTML = `
        <div class="reveal-image image-container ${wClasses}" style="aspect-ratio:3/4;">
          <div class="shimmer"></div>
          <img src="${project.cover}" alt="${project.title}" loading="lazy"
               style="width:100%;height:100%;object-fit:cover;" />
        </div>
        <div class="project-meta ${wClasses}">
          <div>
            <h2 class="font-serif-display project-title">${project.title}</h2>
            <p class="font-sans-ui text-muted" style="margin-top:0.25rem;">${project.category}</p>
          </div>
          <span class="font-sans-ui text-muted tabular-nums">${project.year}</span>
        </div>
      `;
        grid.appendChild(el);
      });

      initRevealImages();
      initImageLoad();
    });
  </script>
</body>

</html>
