  <style>
    /* ── Lightbox overlay ───────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0a0a0a;
      flex-direction: row;
      overflow-x: scroll;
      overflow-y: hidden;
      scrollbar-width: none;
    }

    .lightbox::-webkit-scrollbar {
      display: none;
    }

    .lightbox.open {
      display: flex;
    }

    /* each image in lightbox */
    .lightbox-slide {
      flex: 0 0 auto;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-slide img {
      height: 100%;
      width: auto;
      max-width: none;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* close button */
    .lightbox-close {
      position: fixed;
      top: 2rem;
      right: 2.5rem;
      z-index: 210;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      transition: color 0.2s;
      display: none;
    }

    .lightbox-close:hover {
      color: #fff;
    }

    .lightbox.open~.lightbox-close,
    .lightbox-close.visible {
      display: block;
    }

    /* wheel → horizontal on desktop */
  </style>
</head>
